  async function handleExportDownload() {
    if (modalState.downloading) return;
    if (modalState.selected.size === 0) {
      modalState.error = 'Pick at least one field.';
      renderExportModal();
      return;
    }
    modalState.downloading = true;
    modalState.error = null;
    renderExportModal();

    const fmt = modalState.format;
    const fields = Array.from(modalState.selected);
    if (GEO_FORMATS.has(fmt)) {
      for (const k of GEO_REQUIRED_KEYS) if (!fields.includes(k)) fields.unshift(k);
    }
    // Project rows down to the selected fields, plus computed effective_disposition.
    const rawRows = modalState.scope === 'all' ? modalState.rows : modalState.filteredRows;
    const projected = rawRows.map(r => {
      const out = {};
      const eff = r.user_override || r.disposition || '';
      for (const k of fields) {
        if (k === 'effective_disposition') out[k] = eff;
        else out[k] = r[k];
      }
      // For geo formats we always need lat/lng available even if not in fields.
      if (GEO_FORMATS.has(fmt)) {
        if (!('lat' in out)) out.lat = r.lat;
        if (!('lng' in out)) out.lng = r.lng;
        if (!('effective_disposition' in out)) out.effective_disposition = eff;
        if (!('pole_number' in out)) out.pole_number = r.pole_number;
      }
      return out;
    });

    const stamp = new Date().toISOString().slice(0, 16).replace('T', '_').replace(':', '');
    const filename = `REI_Pole_Inspections_${stamp}.${fmt}`;
    const metadata = {
      Generated: new Date().toISOString().slice(0, 19).replace('T', ' '),
      Source: 'REI Pole Inspection Dashboard',
      Format: fmt.toUpperCase(),
      'Total Inspections': projected.length,
      'Applied Filters': modalState.scope === 'all' ? '(none \u2014 full export)' : (modalState.filterSummary || '(none)'),
    };

    try {
      let blob, mime;
      if (fmt === 'csv') {
        const body = buildCsv(projected, fields);
        mime = 'text/csv;charset=utf-8';
        blob = new Blob([body], { type: mime });
      } else if (fmt === 'geojson') {
        const body = buildGeoJson(projected, fields);
        mime = 'application/geo+json';
        blob = new Blob([body], { type: mime });
      } else if (fmt === 'kml') {
        const body = buildKml(projected, fields);
        mime = 'application/vnd.google-earth.kml+xml';
        blob = new Blob([body], { type: mime });
      } else if (fmt === 'kmz') {
        await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');
        const kmlStr = buildKml(projected, fields);
        const zip = new window.JSZip();
        zip.file('doc.kml', kmlStr);
        blob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
        mime = 'application/vnd.google-earth.kmz';
      } else if (fmt === 'xlsx') {
        await loadScript('https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js');
        blob = buildXlsx(projected, fields, metadata);
        mime = 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet';
      } else if (fmt === 'pdf') {
        await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
        await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js');
        blob = buildPdf(projected, fields, metadata);
        mime = 'application/pdf';
      } else {
        throw new Error('Unsupported format: ' + fmt);
      }

      triggerDownload(blob, filename);
      showToast('Downloaded ' + filename + ' (' + projected.length.toLocaleString() + ' rows)', 'success');
      setTimeout(() => closeExportModal(), 400);
    } catch (e) {
      modalState.downloading = false;
      modalState.error = 'Export failed: ' + (e.message || e);
      renderExportModal();
      showToast('Export failed: ' + (e.message || e), 'error');
    }
  }

  function triggerDownload(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.rel = 'noopener';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
  }

  function loadScript(url) {
    return new Promise((resolve, reject) => {
      if (document.querySelector('script[data-cdn="' + url + '"]')) return resolve();
      const s = document.createElement('script');
      s.src = url;
      s.setAttribute('data-cdn', url);
      s.onload = () => resolve();
      s.onerror = () => reject(new Error('Failed to load ' + url + ' \u2014 are you offline?'));
      document.head.appendChild(s);
    });
  }

  /* ----- Builders ----- */
  function _csvCell(v) {
    if (v == null) return '';
    if (typeof v === 'number') return Number.isInteger(v) ? String(v) : String(Math.round(v * 1000000) / 1000000);
    if (typeof v === 'boolean') return v ? 'true' : 'false';
    const s = String(v);
    if (/[",\n\r]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
    return s;
  }
  function buildCsv(rows, fields) {
    const headers = fields.map(k => (FIELD_BY_KEY[k] && FIELD_BY_KEY[k].label) || k);
    const lines = [headers.map(_csvCell).join(',')];
    for (const row of rows) lines.push(fields.map(k => _csvCell(row[k])).join(','));
    return '\uFEFF' + lines.join('\r\n');
  }

  function buildGeoJson(rows, fields) {
    const features = [];
    for (const row of rows) {
      const lat = row.lat, lng = row.lng;
      if (lat == null || lng == null) continue;
      const props = {};
      for (const k of fields) {
        if (k === 'lat' || k === 'lng') continue;
        props[k] = row[k];
      }
      features.push({
        type: 'Feature',
        geometry: { type: 'Point', coordinates: [lng, lat] },
        properties: props,
      });
    }
    return JSON.stringify({ type: 'FeatureCollection', features }, null, 2);
  }

  function _xmlEscape(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&apos;' }[c]));
  }
  function buildKml(rows, fields) {
    const geoRows = rows.filter(r => r.lat != null && r.lng != null);
    const skipped = rows.length - geoRows.length;
    const buckets = new Map();
    for (const r of geoRows) {
      const disp = (r.effective_disposition || r.user_override || r.disposition || '_default').toLowerCase();
      if (!buckets.has(disp)) buckets.set(disp, []);
      buckets.get(disp).push(r);
    }

    const parts = [];
    parts.push('<?xml version="1.0" encoding="UTF-8"?>');
    parts.push('<kml xmlns="http://www.opengis.net/kml/2.2">');
    parts.push('<Document>');
    parts.push('<name>' + _xmlEscape('REI Pole Inspections (' + geoRows.length + ')') + '</name>');
    const skippedNote = skipped ? ('  Skipped ' + skipped + ' records that had no coordinates.') : '';
    parts.push('<description>' + _xmlEscape(
      'Generated by REI Pole Inspection Dashboard on ' + new Date().toISOString().slice(0, 16).replace('T', ' ') +
      ' (' + geoRows.length + ' placemarks, ' + Math.max(0, fields.length - 2) + ' attribute fields).' + skippedNote
    ) + '</description>');

    for (const [disp, info] of Object.entries(DISPOSITION_PALETTE)) {
      parts.push('<Style id="disp-' + disp + '">');
      parts.push('<IconStyle><color>' + info.kml + '</color><scale>1.1</scale>');
      parts.push('<Icon><href>http://maps.google.com/mapfiles/kml/paddle/wht-blank.png</href></Icon></IconStyle>');
      parts.push('<LabelStyle><scale>0.85</scale></LabelStyle>');
      parts.push('</Style>');
    }

    const sortedBuckets = Array.from(buckets.entries()).sort((a, b) => a[0].localeCompare(b[0]));
    for (const [disp, rowsInBucket] of sortedBuckets) {
      const info = DISPOSITION_PALETTE[disp] || DISPOSITION_PALETTE._default;
      parts.push('<Folder>');
      parts.push('<name>' + _xmlEscape(info.label + ' (' + rowsInBucket.length + ')') + '</name>');
      for (const row of rowsInBucket) parts.push(_kmlPlacemark(row, fields, disp));
      parts.push('</Folder>');
    }
    parts.push('</Document></kml>');
    return parts.join('\n');
  }
  function _kmlPlacemark(row, fields, disp) {
    const name = String(row.pole_number || 'Pole');
    const lat = row.lat, lng = row.lng;
    const popupRows = [];
    for (const k of fields) {
      if (k === 'lat' || k === 'lng') continue;
      const v = row[k];
      if (v == null || v === '') continue;
      const lbl = (FIELD_BY_KEY[k] && FIELD_BY_KEY[k].label) || k;
      popupRows.push(
        '<tr><td style="padding:2px 8px 2px 0;color:#555;font-weight:600">' + _xmlEscape(lbl) + '</td>' +
        '<td style="padding:2px 0">' + _xmlEscape(String(v)) + '</td></tr>'
      );
    }
    const popup =
      '<div style="font-family:Arial,sans-serif;font-size:12px">' +
      '<h3 style="margin:0 0 6px;color:#1F3A5C">' + _xmlEscape(name) + '</h3>' +
      '<table style="border-collapse:collapse">' + popupRows.join('') + '</table></div>';

    const ext = [];
    for (const k of fields) {
      if (k === 'lat' || k === 'lng') continue;
      const v = row[k];
      const lbl = (FIELD_BY_KEY[k] && FIELD_BY_KEY[k].label) || k;
      ext.push(
        '<Data name="' + _xmlEscape(k) + '">' +
        '<displayName>' + _xmlEscape(lbl) + '</displayName>' +
        '<value>' + _xmlEscape(v == null ? '' : String(v)) + '</value>' +
        '</Data>'
      );
    }
    return (
      '<Placemark>' +
      '<name>' + _xmlEscape(name) + '</name>' +
      '<styleUrl>#disp-' + disp + '</styleUrl>' +
      '<description><![CDATA[' + popup + ']]></description>' +
      '<ExtendedData>' + ext.join('') + '</ExtendedData>' +
      '<Point><coordinates>' + lng + ',' + lat + ',0</coordinates></Point>' +
      '</Placemark>'
    );
  }

  function buildXlsx(rows, fields, metadata) {
    const X = window.XLSX;
    if (!X) throw new Error('SheetJS failed to load');
    const headers = fields.map(k => (FIELD_BY_KEY[k] && FIELD_BY_KEY[k].label) || k);
    const data = [headers, ...rows.map(r => fields.map(k => {
      const v = r[k];
      if (v == null) return '';
      return v;
    }))];
    const wb = X.utils.book_new();
    const ws = X.utils.aoa_to_sheet(data);
    // Approximate column widths: max(12, header.length + 2), capped at 40.
    ws['!cols'] = headers.map(h => ({ wch: Math.min(Math.max(12, String(h).length + 2), 40) }));
    ws['!freeze'] = { ySplit: 1 };
    X.utils.book_append_sheet(wb, ws, 'Inspections');

    // Metadata sheet
    const metaRows = [['Key', 'Value']];
    for (const [k, v] of Object.entries(metadata)) metaRows.push([k, String(v)]);
    metaRows.push([]);
    metaRows.push(['Included Fields']);
    for (const k of fields) metaRows.push([k, (FIELD_BY_KEY[k] && FIELD_BY_KEY[k].label) || k]);
    const metaWs = X.utils.aoa_to_sheet(metaRows);
    metaWs['!cols'] = [{ wch: 28 }, { wch: 60 }];
    X.utils.book_append_sheet(wb, metaWs, 'Metadata');

    const out = X.write(wb, { type: 'array', bookType: 'xlsx' });
    return new Blob([out], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  }

  function buildPdf(rows, fields, metadata) {
    const J = window.jspdf || window.jsPDF;
    const ctor = (J && J.jsPDF) ? J.jsPDF : window.jsPDF;
    if (!ctor) throw new Error('jsPDF failed to load');
    const doc = new ctor({ unit: 'pt', format: 'letter', orientation: 'portrait' });
    const PAGE_W = doc.internal.pageSize.getWidth();
    const PAGE_H = doc.internal.pageSize.getHeight();
    const M = 40;

    // Cover page
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(20);
    doc.setTextColor(196, 18, 48);
    doc.text('REI Pole Inspection Report', M, 70);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    doc.setTextColor(80, 80, 80);
    let y = 100;
    for (const [k, v] of Object.entries(metadata)) {
      doc.text(k + ': ' + String(v), M, y);
      y += 16;
    }
    doc.setDrawColor(220, 220, 220);
    doc.line(M, y + 8, PAGE_W - M, y + 8);
    y += 28;
    doc.setFont('helvetica', 'bold');
    doc.text('Total Inspections: ' + rows.length, M, y);

    // One page per pole (max 200 to keep PDF a sensible size).
    const detailRows = rows.slice(0, 200);
    for (let i = 0; i < detailRows.length; i++) {
      const row = detailRows[i];
      doc.addPage();
      const disp = String(row.effective_disposition || row.disposition || '_default').toLowerCase();
      const info = DISPOSITION_PALETTE[disp] || DISPOSITION_PALETTE._default;
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(16);
      doc.setTextColor(196, 18, 48);
      doc.text('Pole ' + (row.pole_number || '(unknown)'), M, 60);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(11);
      const r = parseInt(info.hex.slice(0, 2), 16);
      const g = parseInt(info.hex.slice(2, 4), 16);
      const b = parseInt(info.hex.slice(4, 6), 16);
      doc.setTextColor(r, g, b);
      doc.text(info.label + (row.data_source ? '  \u2014  ' + row.data_source : ''), M, 80);
      const tableBody = [];
      for (const k of fields) {
        const v = row[k];
        if (v == null || v === '') continue;
        const lbl = (FIELD_BY_KEY[k] && FIELD_BY_KEY[k].label) || k;
        tableBody.push([lbl, String(v)]);
      }
      if (tableBody.length === 0) tableBody.push(['(no data)', '']);
      doc.autoTable({
        head: [['Field', 'Value']],
        body: tableBody,
        startY: 100,
        theme: 'grid',
        headStyles: { fillColor: [26, 28, 32], textColor: [240, 241, 243], fontStyle: 'bold', fontSize: 10 },
        styles: { fontSize: 9, cellPadding: 4, textColor: [40, 40, 40] },
        alternateRowStyles: { fillColor: [246, 248, 252] },
        columnStyles: { 0: { cellWidth: 160, fontStyle: 'bold' } },
        margin: { left: M, right: M },
      });
    }
    if (rows.length > detailRows.length) {
      doc.addPage();
      doc.setFontSize(11);
      doc.setTextColor(80, 80, 80);
      doc.text(
        'Note: PDF detail pages capped at the first 200 inspections (' +
        (rows.length - detailRows.length).toLocaleString() + ' more rows in this export).',
        M, 60
      );
      doc.text('Re-export as CSV / XLSX to see every row.', M, 80);
    }
    const arrBuf = doc.output('arraybuffer');
    return new Blob([arrBuf], { type: 'application/pdf' });
  }

  /* ----- Toast ----- */
  let toastTimer = null;
  function showToast(msg, kind) {
    const el = document.getElementById('toast');
    if (!el) return;
    el.className = 'toast show' + (kind ? ' ' + kind : '');
    el.textContent = msg;
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = 'toast'; }, 3500);
  }

  /* ============================================================
   * 8d. Import CSV — lets the recipient drop in a real export
   * from the live dashboard so this file becomes their personal
   * dashboard for that dataset.
   * ============================================================ */
  function parseCsv(text) {
    // Simple but robust RFC-4180 parser. Handles quoted fields,
    // doubled quotes, embedded commas/newlines, BOM, CR/LF mix.
    if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
    const rows = [];
    let row = [];
    let field = '';
    let i = 0;
    let inQuotes = false;
    while (i < text.length) {
      const c = text[i];
      if (inQuotes) {
        if (c === '"') {
          if (text[i + 1] === '"') { field += '"'; i += 2; continue; }
          inQuotes = false; i++; continue;
        }
        field += c; i++; continue;
      }
      if (c === '"') { inQuotes = true; i++; continue; }
      if (c === ',') { row.push(field); field = ''; i++; continue; }
      if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; i++; continue; }
      if (c === '\r') {
        if (text[i + 1] === '\n') { row.push(field); rows.push(row); row = []; field = ''; i += 2; continue; }
        row.push(field); rows.push(row); row = []; field = ''; i++; continue;
      }
      field += c; i++;
    }
    if (field.length > 0 || row.length > 0) { row.push(field); rows.push(row); }
    return rows.filter(r => r.some(c => c !== ''));
  }

  function _matchHeader(h) {
    // Live exports use human labels ("Pole #", "Latitude", ...). Map them
    // back to our keys via FIELD_DEFS.label, falling back to direct key match.
    const trimmed = String(h).trim();
    const byLabel = FIELD_DEFS.find(f => f.label.toLowerCase() === trimmed.toLowerCase());
    if (byLabel) return byLabel.key;
    const byKey = FIELD_DEFS.find(f => f.key.toLowerCase() === trimmed.toLowerCase().replace(/\s+/g, '_'));
    if (byKey) return byKey.key;
    return null;
  }
  function _coerceValue(key, raw) {
    if (raw == null) return null;
    const s = String(raw).trim();
    if (s === '') return null;
    const def = FIELD_BY_KEY[key];
    if (!def) return s;
    if (def.type === 'number') {
      const n = parseFloat(s.replace(/,/g, ''));
      return Number.isFinite(n) ? n : null;
    }
    if (def.key === 'nesc_reject') return /^(yes|true|1)$/i.test(s);
    return s;
  }

  function applyImportedRows(rows, filename) {
    if (!rows || rows.length < 2) throw new Error('CSV is empty.');
    const headers = rows[0].map(_matchHeader);
    const validIdxs = headers.map((k, i) => k ? i : -1).filter(i => i >= 0);
    if (validIdxs.length === 0) throw new Error('No recognized column names. Expected headers like "Pole #", "Inspection Date", etc.');
    const haveKey = new Set(validIdxs.map(i => headers[i]));
    if (!haveKey.has('pole_number') && !haveKey.has('disposition') && !haveKey.has('effective_disposition')) {
      throw new Error('CSV must include at least Pole # and a Disposition column.');
    }
    const out = [];
    let id = 1;
    for (let r = 1; r < rows.length; r++) {
      const cells = rows[r];
      const obj = { id };
      for (const i of validIdxs) {
        const k = headers[i];
        obj[k] = _coerceValue(k, cells[i]);
      }
      // Defaults for fields the CSV may omit so the rest of the UI keeps working.
      if (obj.disposition == null && obj.effective_disposition != null) obj.disposition = obj.effective_disposition;
      if (obj.review_status == null) obj.review_status = 'approved';
      if (obj.user_override === null || obj.user_override === '') obj.user_override = null;
      if (obj.nesc_reject == null) obj.nesc_reject = false;
      if (obj.test_type == null) obj.test_type = 'Sound + Bore';
      if (obj.data_source == null) obj.data_source = 'IMPORT';
      if (obj.inspection_date == null) obj.inspection_date = '';
      out.push(obj);
      id++;
    }
    out.sort((a, b) => ((a.inspection_date || '') < (b.inspection_date || '') ? 1 : -1));
    ALL_ITEMS = out;
    DATA_SOURCE_LABEL = 'Imported: ' + filename + ' (' + out.length.toLocaleString() + ' rows)';
    recomputeStats();
    // Reset to dashboard with no filters so the new data is fully visible.
    window.location.hash = '#/';
    render();
    updateImportStatus();
    showToast('Imported ' + out.length.toLocaleString() + ' inspections from ' + filename, 'success');
  }

  function handleImportFile(ev) {
    const file = ev.target.files && ev.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const text = String(reader.result || '');
        const rows = parseCsv(text);
        applyImportedRows(rows, file.name);
      } catch (e) {
        showToast('Import failed: ' + (e.message || e), 'error');
      } finally {
        ev.target.value = '';
      }
    };
    reader.onerror = () => { showToast('Could not read file.', 'error'); ev.target.value = ''; };
    reader.readAsText(file);
  }
  function triggerImport() {
    const input = document.getElementById('import-file-input');
    if (input) input.click();
  }
  function resetToSampleData() {
    if (!confirm('Reset to the built-in sample dataset? Your imported data will be cleared.')) return;
    ALL_ITEMS = buildSampleDataset();
    DATA_SOURCE_LABEL = 'Sample data \u2014 internal review';
    recomputeStats();
    window.location.hash = '#/';
    render();
    updateImportStatus();
    showToast('Reverted to sample dataset.', 'success');
  }
  function updateImportStatus() {
    const el = document.getElementById('import-status');
    if (!el) return;
    el.textContent = DATA_SOURCE_LABEL;
    el.classList.toggle('live', !DATA_SOURCE_LABEL.startsWith('Sample'));
    const sub = document.getElementById('hdr-sub');
    if (sub) sub.textContent = DATA_SOURCE_LABEL.startsWith('Sample')
      ? 'Review Dashboard \u2014 Sample data'
      : 'Review Dashboard \u2014 Imported dataset';
    const reset = document.getElementById('reset-sample-btn');
    if (reset) reset.style.display = DATA_SOURCE_LABEL.startsWith('Sample') ? 'none' : 'inline-flex';
  }

  // Expose handlers used by inline event attributes.
  window.openExportModal = openExportModal;
  window.closeExportModal = closeExportModal;
  window.setExportFormat = setExportFormat;
  window.setExportScope = setExportScope;
  window.toggleField = toggleField;
  window.toggleGroup = toggleGroup;
  window.selectAllFields = selectAllFields;
  window.selectNoneFields = selectNoneFields;
  window.handleExportDownload = handleExportDownload;
  window.handleImportFile = handleImportFile;
  window.triggerImport = triggerImport;
  window.resetToSampleData = resetToSampleData;
  // Backwards-compat shims for any older inline attrs.
  window.exportDashboardCsv = () => openExportModal('all');
  window.exportInspectionsCsv = () => openExportModal('filtered');

  /* ============================================================
   * 9. Top-level route dispatcher
   * ============================================================ */
  function render() {
    renderNav();
    const { path } = parseHash();
    // Tear down lifecycle-bound widgets (Leaflet map, Chart.js report
    // charts) when navigating to anything other than the page that
    // owns them. Each owning renderer also calls these defensively.
    if (path !== '/map' && leafletMap) {
      try { leafletMap.remove(); } catch (_) {}
      leafletMap = null;
      leafletMarkers = null;
    }
    if (path !== '/reports') destroyReportCharts();

    if (path === '/' || path === '') return renderDashboard();
    if (path === '/inspections') return renderInspections();
    if (path.startsWith('/inspections/')) return renderPoleDetail(path.slice('/inspections/'.length));
    if (path === '/map') return renderMap();
    if (path === '/reports') return renderReports();
    document.getElementById('main').innerHTML = `
      <div class="placeholder">
        <h2>Page not found</h2>
        <p>Try <a href="#/" style="color:var(--red); text-decoration:underline;">Dashboard</a>.</p>
      </div>`;
  }

  document.getElementById('hdr-date').textContent = new Date().toISOString().slice(0, 10);
  document.getElementById('ftr-date').textContent = new Date().toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });

  window.addEventListener('hashchange', render);
  window.addEventListener('keydown', (e) => { if (e.key === 'Escape' && modalState.open) closeExportModal(); });
  window.addEventListener('DOMContentLoaded', () => {
    if (!window.location.hash) window.location.hash = '#/';
    render();
    updateImportStatus();
  });
  </script>

  <!-- Modal mount + toast -->
  <div id="export-modal-mount"></div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
</body>
</html>
